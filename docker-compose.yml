version: '3.8'

services:
  # Main Eclipse Memory Agent
  eclipse-memory:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eclipse-memory
    ports:
      - "50001:50001"  # Main web interface
      - "50002:50002"  # WebSocket
    volumes:
      - ./memory:/app/memory
      - ./config:/app/config
      - ./skills:/app/skills
      - ./knowledge:/app/knowledge
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=production
      - PORT=50001
      - WS_PORT=50002
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - KIMI_API_KEY=${KIMI_API_KEY}
      - MEMORY_PATH=/app/memory
      - CONFIG_PATH=/app/config
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - eclipse-network

  # WhatsApp Bridge
  whatsapp-bridge:
    build:
      context: ./integrations/whatsapp
      dockerfile: Dockerfile
    container_name: eclipse-whatsapp
    ports:
      - "50003:50003"
    volumes:
      - ./credentials/whatsapp:/app/credentials
      - ./memory:/app/memory
    environment:
      - PORT=50003
      - ECLIPSE_API_URL=http://eclipse-memory:50001
      - WHATSAPP_LEAD_SHEET_ID=${WHATSAPP_LEAD_SHEET_ID}
      - LEAD_EMAIL_RECIPIENT=${LEAD_EMAIL_RECIPIENT}
      - GOOGLE_CREDENTIALS_PATH=/app/credentials/google.json
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - eclipse-memory
    networks:
      - eclipse-network

  # Vector Database (Chroma)
  vector-db:
    image: chromadb/chroma:latest
    container_name: eclipse-vector
    ports:
      - "8000:8000"
    volumes:
      - ./memory/vector:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    networks:
      - eclipse-network

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: eclipse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - eclipse-network

networks:
  eclipse-network:
    driver: bridge

volumes:
  redis-data:
